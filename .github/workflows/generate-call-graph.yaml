# SPDX-License-Identifier: Apache-2.0
name: Generate Call Graph
on:
  workflow_dispatch:
    inputs:
      artifact:
        required: true
        type: string
        description: GAV coordinate of the project to analyze in the format group-id:artifact-id:version (e.g., org.apache.logging.log4j:log4j-core:2.25.2)

run-name: Generate Call Graph for ${{ inputs.artifact }}

# Empty permissions at the workflow level; specific jobs will set their own permissions
permissions: { }

jobs:
  generate-call-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: read
    steps:
      - name: Checkout Metadata Repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # 5.0.0
        with:
          repository: ${{ github.repository }}
          path: metadata

      - name: Determine Source Code Location
        env:
          ARTIFACT: ${{ inputs.artifact }}
        run: |
          echo "Artifact to analyze: $ARTIFACT"
          GAV_PARTS=(${ARTIFACT//:/ })
          VERSION="${GAV_PARTS[2]}"
          echo "Version extracted: $VERSION"
          # Find location metadata file
          METADATA_FILE="metadata/metadata/${GAV_PARTS[0]}/${GAV_PARTS[1]}/location.json"
          if [ ! -f "$METADATA_FILE" ]; then
            echo "Metadata file not found: $METADATA_FILE"
            exit 1
          fi
          # Extract metadata to environment variables
          REPOSITORY="$(jq -r .repository "$METADATA_FILE")"
          TAG="$(printf "$(jq -r .tag "$METADATA_FILE")" "$VERSION")"
          RELATIVE_PATH="$(jq -r .relative_path "$METADATA_FILE")"
          # Debug output
          echo "Source repository: $REPOSITORY"
          echo "Source tag: $TAG"
          echo "Relative path: $RELATIVE_PATH"
          # Set environment variables for later steps
          echo "REPOSITORY=$REPOSITORY" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "RELATIVE_PATH=$RELATIVE_PATH" >> $GITHUB_ENV

      - name: Checkout Source Repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # 5.0.0
        with:
          repository: ${{ env.REPOSITORY }}
          ref: ${{ env.TAG }}
          path: source

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # 3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Call Graph Generation
        shell: bash
        env:
          ARTIFACT: ${{ inputs.artifact }}
        run: |
          # Prepare source code directory
          if [ -n "$RELATIVE_PATH" ]; then
             INPUT_DIR="source/$RELATIVE_PATH"
          else
             INPUT_DIR="source"
          fi
          # Directory for call graph output
          mkdir -p result
          dest_dir="metadata/metadata/${ARTIFACT//:/\/}"
          mkdir -p "$dest_dir"
          
          # Pull and run the call graph generator
          IMAGE="ghcr.io/vex-generation-toolset/java-callgraph:latest"
          docker pull $IMAGE
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/${INPUT_DIR}:/workspace/source" \
            -v "${GITHUB_WORKSPACE}/result:/workspace/result" \
            $IMAGE
          
          # Move generated call graph to metadata repository
          mv result/*.json "$dest_dir/callgraph.json"

      - name: Commit and Push Call Graph
        shell: bash
        env:
          ARTIFACT: ${{ inputs.artifact }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cd metadata
          # Create PR branch name
          BRANCH_NAME="callgraph/${ARTIFACT//:/-}"
          git checkout -b "$BRANCH_NAME"
          # Commit changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git commit -m "Add call graph for ${ARTIFACT}"; then
            git push origin "$BRANCH_NAME"
            # Create Pull Request
            gh pr create \
                --title "Add call graph for ${ARTIFACT}" \
                --body "This PR adds the generated call graph for the artifact ${ARTIFACT}." \
                --head "$BRANCH_NAME" \
                --base main || echo "Pull request already exists"
          else
            echo "No changes to commit; skipping push and PR creation"
          fi